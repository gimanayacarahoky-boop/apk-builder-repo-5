name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true
      tag:
        description: "Tag build"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ZIP
        run: |
          echo "Downloading from: ${{ github.event.inputs.zip_url }}"
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          ls -la project.zip
          file project.zip

      - name: Extract ZIP
        run: |
          mkdir -p project_source
          unzip -o project.zip -d project_source/
          ls -la project_source/
          
          if [ -f "project_source/pubspec.yaml" ]; then
            echo "PROJECT_DIR=project_source" >> $GITHUB_ENV
          elif [ -f "project_source/*/pubspec.yaml" ]; then
            DIR=$(find project_source -name "pubspec.yaml" -type f | head -1 | xargs dirname)
            echo "PROJECT_DIR=$DIR" >> $GITHUB_ENV
          else
            echo "PROJECT_DIR=project_source" >> $GITHUB_ENV
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Flutter Doctor
        run: flutter doctor

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter clean
            flutter pub get
            flutter build apk --${{ github.event.inputs.build_type }}
          elif [ -f "gradlew" ]; then
            chmod +x gradlew
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug
            else
              ./gradlew assembleRelease
            fi
          else
            echo "No valid project found!"
            exit 1
          fi

      - name: Find APK
        run: |
          find . -name "*.apk" -type f
          APK_FILE=$(find . -name "*.apk" -type f | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "APK_FILE=$APK_FILE" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.APK_FILE }}
          retention-days: 7