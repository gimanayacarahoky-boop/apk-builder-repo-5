name: Web2APK

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
      app_name:
        description: 'Nama Aplikasi'
        required: true
      icon_url:
        description: 'Icon Url'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Create Flutter Project
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          PKG=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/ /_/g' | sed 's/[^a-z0-9_]//g')
          flutter create --org com.webapk --project-name "$PKG" webapp

      - name: Add WebView
        working-directory: webapp
        run: |
          flutter pub add webview_flutter
          flutter pub add flutter_launcher_icons

      - name: Create Main App
        working-directory: webapp
        run: |
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() {
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '$APP_NAME',
                debugShowCheckedModeBanner: false,
                home: const WebViewPage(),
              );
            }
          }

          class WebViewPage extends StatefulWidget {
            const WebViewPage({super.key});
            @override
            State<WebViewPage> createState() => _WebViewPageState();
          }

          class _WebViewPageState extends State<WebViewPage> {
            late final WebViewController _controller;

            @override
            void initState() {
              super.initState();
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..loadRequest(Uri.parse('$WEB_URL'));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: WebViewWidget(controller: _controller),
                ),
              );
            }
          }
          EOF

      - name: Setup Icon
        working-directory: webapp
        run: |
          mkdir -p assets/images
          curl -L -o assets/images/icon.png "${{ github.event.inputs.icon_url }}" || echo "Using default"
          
          cat > flutter_launcher_icons.yaml << 'EOF'
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/images/icon.png"
            min_sdk_android: 21
          EOF
          
          flutter pub get
          dart run flutter_launcher_icons || true

      - name: Build APK
        working-directory: webapp
        run: |
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: webapp-${{ github.event.inputs.app_name }}
          path: webapp/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7